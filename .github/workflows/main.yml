name: Auto Fetch Rainfall Data

on:
  schedule:
    # สั่งให้ทำงานทุกๆ 1 ชั่วโมง (บวกเวลาสากล UTC เพื่อให้รันในเวลาไทยเที่ยงตรง)
    - cron: '0 * * * *'
  workflow_dispatch: # ปุ่มกดให้รันมือเองได้ เผื่อขี้เกียจรอเวลารัน

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run script
      env:
        GG_SCRIPT_URL: ${{ secrets.GG_SCRIPT_URL }}
      run: python fetch_rain.py
