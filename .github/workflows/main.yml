- name: Create index.html
  run: |
    cat << 'EOF' > index.html
    <!DOCTYPE html>
    <html lang="th">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>ข้อมูลฝนสะสมเมื่อวาน</title>

      <style>
        body{
          font-family: Arial, sans-serif;
          margin:20px;
          background:#f5f5f5;
        }

        h1{
          color:#1877f2;
        }

        pre{
          background:white;
          padding:15px;
          border-radius:8px;
          overflow:auto;
          border:1px solid #ddd;
        }
      </style>
    </head>

    <body>

      <h1>ข้อมูลฝนสะสมเมื่อวาน</h1>

      <div id="url"></div>
      <pre id="result">กำลังโหลด...</pre>

      <script>

      // วันที่ปัจจุบัน
      const now = new Date();

      // เมื่อวาน
      const yesterday = new Date(
        now.getFullYear(),
        now.getMonth(),
        now.getDate() - 1
      );

      const yyyy = yesterday.getFullYear();

      const mm = String(
        yesterday.getMonth() + 1
      ).padStart(2,'0');

      const dd = String(
        yesterday.getDate()
      ).padStart(2,'0');

      const datePart = `${yyyy}-${mm}-${dd}`;

      const apiUrl =
        `http://122.155.135.51/api/map/climateContourGeo` +
        `?t=period` +
        `&y=${yyyy}` +
        `&m=${mm}` +
        `&fd=${datePart}` +
        `&td=${datePart}` +
        `&f=rf_sum`;

      document.getElementById("url").innerHTML =
        `<b>URL:</b> ${apiUrl}`;

      fetch(apiUrl)
        .then(r => r.json())
        .then(data => {
          document.getElementById("result").textContent =
            JSON.stringify(data, null, 2);
        })
        .catch(err => {
          document.getElementById("result").textContent =
            "ERROR : " + err;
        });

      </script>

    </body>
    </html>
    EOF
