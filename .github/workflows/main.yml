name: Deploy Code Text Webpage

on:
  workflow_dispatch: # เปิดปุ่มกดรันมือได้

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Create index.html with Code Text
      run: |
        cat << 'EOF' > index.html
        <!DOCTYPE html>
        <html lang="th">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>สคริปต์คำนวณ URL วันเมื่อวาน</title>
            <style>
                body {
                    font-family: 'Courier New', Courier, monospace;
                    background-color: #282c34;
                    color: #abb2bf;
                    padding: 20px;
                    line-height: 1.6;
                }
                pre {
                    background-color: #1e1e1e;
                    padding: 15px;
                    border-radius: 5px;
                    overflow-x: auto;
                    white-space: pre-wrap;
                    word-wrap: break-word;
                }
            </style>
        </head>
        <body>
            <pre>let
    // 🔄 สเต็ปที่ 1: ตรวจสอบวันปัจจุบันของคอมพิวเตอร์ และคำนวณหาวันที่ของ "เมื่อวานนี้"
    CurrentDateTime = DateTime.LocalNow(),
    YesterdayDate = Date.AddDays(DateTime.Date(CurrentDateTime), -1),
    
    // แปลง ปี เดือน วัน ของเมื่อวานให้อยู่ในฟอร์แมต text (yyyy-MM-dd)
    YearStr = Text.From(Date.Year(YesterdayDate)),
    MonthStr = Text.PadStart(Text.From(Date.Month(YesterdayDate)), 2, "0"),
    DayStr = Text.PadStart(Text.From(Date.Day(YesterdayDate)), 2, "0"),
    DatePart = YearStr & "-" & MonthStr & "-" & DayStr,

    // 🔗 สเต็ปที่ 2: ประกอบร่าง URL สำหรับดึงค่าฝนสะสมรายวันของเมื่อวาน (f=rf_sum)
    DynamicURL = "http://122.155.135.51/api/map/climateContourGeo?t=period&y=" & YearStr & "&m=" & MonthStr & "&fd=" & DatePart & "&td=" & DatePart & "&f=rf_sum"</pre>
        </body>
        </html>
        EOF

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
