name: Auto Fetch Rainfall Data

on:
  schedule:
    - cron: '0 * * * *' # ⏰ รันอัตโนมัติทุกๆ 1 ชั่วโมง
  workflow_dispatch: # 🔘 เปิดปุ่มกดรันมือได้

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # เปิดสิทธิ์เขียนไฟล์ในระดับสคริปต์ด้วย

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run script
      run: python fetch_rain.py

    # 🚀 ดันไฟล์ TEXT กลับขึ้นคลังโค้ด GitHub หลังจากเราเปิดสิทธิ์ในขั้นตอนที่ 1 แล้ว
    - name: Commit and Push TEXT file
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add rain_data.txt
        git diff-index --quiet HEAD || git commit -m "Automated update rainfall TEXT data"
        git push
