name: Auto Fetch Rainfall Data

on:
  schedule:
    - cron: '0 * * * *' # ⏰ รันอัตโนมัติทุกๆ 1 ชั่วโมง
  workflow_dispatch: # 🔘 เปิดปุ่มกดรันมือได้

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run script
      env:
        GG_SCRIPT_URL: ${{ secrets.GG_SCRIPT_URL }}
      run: python fetch_rain.py
