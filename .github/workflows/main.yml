name: Deploy API Response

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
permissions:
  contents: read
  pages: write
  id-token: write

steps:

  - name: Create Raw File
    run: |
      echo "TEST" > index.html

  - name: Setup Pages
