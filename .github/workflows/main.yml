name: Auto Fetch Rainfall Data

on:
  schedule:
    - cron: '0 * * * *' # ⏰ รันอัตโนมัติทุกๆ 1 ชั่วโมง
  workflow_dispatch: # 🔘 เปิดปุ่มกดรันมือได้

jobs:
  build:
    runs-on: ubuntu-latest
    
    # เปิดสิทธิ์ให้บอทส่งไฟล์ขึ้นระบบสร้างหน้าเว็บ (GitHub Pages) โดยตรง
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run script
      run: python fetch_rain.py

    - name: Setup Pages
      uses: actions/configure-pages@v4

    # 📦 สเต็ปแพ็คไฟล์ TEXT ส่งขึ้นระบบสร้างหน้าเว็บ
    - name: Upload Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.' # ส่งไฟล์ทั้งหมดรวมถึง rain_data.txt ขึ้นระบบเว็บ
        
    # 🌐 สเต็ปสั่งเปิดหน้าเว็บสาธารณะทันที
    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
