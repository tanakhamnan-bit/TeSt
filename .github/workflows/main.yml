name: Deploy Hello Webpage

on:
  workflow_dispatch: # เปิดปุ่มกดรันมือได้

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Create index.html
      run: |
        cat << 'EOF' > index.html
        <!DOCTYPE html>
        <html lang="th">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Dynamic URL Generator</title>
            <style>
                body {
                    margin: 0;
                    padding: 20px;
                    font-family: monospace;
                    background-color: #ffffff;
                    color: #000000;
                    word-break: break-all;
                }
            </style>
        </head>
        <body>
            <div id="target-url">กำลังคำนวณลิงก์...</div>

            <script>
                // 🔄 สเต็ปที่ 1: ตรวจสอบวันปัจจุบันของคอมพิวเตอร์ และคำนวณหาวันที่ของ "เมื่อวานนี้"
                const currentDateTime = new Date();
                const yesterdayDate = new Date(currentDateTime);
                yesterdayDate.setDate(currentDateTime.getDate() - 1);
                
                // แปลง ปี เดือน วัน ของเมื่อวานให้อยู่ในฟอร์แมต text (yyyy-MM-dd)
                const yearStr = yesterdayDate.getFullYear().toString();
                const monthStr = (yesterdayDate.getMonth() + 1).toString().padStart(2, '0');
                const dayStr = yesterdayDate.getDate().toString().padStart(2, '0');
                const datePart = `${yearStr}-${monthStr}-${dayStr}`;

                // 🔗 สเต็ปที่ 2: ประกอบร่าง URL สำหรับดึงค่าฝนสะสมรายวันของเมื่อวาน (f=rf_sum)
                const dynamicURL = `http://122.155.135.51/api/map/climateContourGeo?t=period&y=${yearStr}&m=${monthStr}&fd=${datePart}&td=${datePart}&f=rf_sum`;
                
                // พ่นเฉพาะข้อความลิงก์ออกสู่หน้าจอหน้าเว็บตรงๆ เพื่อให้ GAS มาดึงง่าย
                document.getElementById('target-url').innerText = dynamicURL;
            </script>
        </body>
        </html>
        EOF

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
